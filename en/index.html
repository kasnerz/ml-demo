<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Machine Learning Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Source+Sans+3:ital,opsz,wght@0,9..46,300..900;1,9..46,300..900&display=swap"
        rel="stylesheet">
    <link href="../assets/css/base.css" rel="stylesheet">
    <link href="../assets/css/quiz.css" rel="stylesheet">
</head>

<body>
    <div class="quiz-container">
        <div class="image-panel">
            <div class="image-frame">
                <img id="quiz-image" src="" alt="Quiz image" style="display: none;">
                <div id="image-placeholder" class="image-placeholder" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                        <circle cx="9" cy="9" r="2"></circle>
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                    </svg>
                    <p data-i18n="placeholder">Loading image...</p>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="mode-selector">
                <button type="button" id="train-mode-btn" class="mode-btn" data-mode="train">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    <span data-i18n="training">Training</span>
                </button>
                <button type="button" id="test-mode-btn" class="mode-btn" data-mode="test">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="m9 12 2 2 4-4"></path>
                    </svg>
                    <span data-i18n="testing">Testing</span>
                </button>
            </div>

            <div class="progress-chip">
                <span data-i18n="example">Example</span>
                <span id="current-image">-</span>
                /
                <span id="total-images">-</span>
            </div>

            <div class="loading-spinner" id="loading-spinner" style="display: block;">
                <div class="spinner" role="status" aria-label="Loading"></div>
                <p data-i18n="loading_images">Loading images...</p>
            </div>

            <p class="quiz-question" data-i18n="question">Which class does this image belong to?</p>
            <div id="answer-buttons" hidden></div>

            <div class="navigation-controls">
                <button type="button" id="prev-btn" class="btn-nav" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="m15 18-6-6 6-6"></path>
                    </svg>
                    <span data-i18n="previous">Previous</span>
                </button>
                <button type="button" id="next-btn" class="btn-nav" disabled>
                    <span data-i18n="next">Next</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="m9 18 6-6-6-6"></path>
                    </svg>
                </button>
                <button type="button" id="restart-btn" class="btn-nav" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                    <span data-i18n="restart">Restart</span>
                </button>
            </div>
        </div>
    </div>

    <dialog id="results-dialog">
        <div class="dialog-article">
            <div class="dialog-header">
                <h2 data-i18n="evaluation">Evaluation</h2>
                <button type="button" class="dialog-close" data-close-dialog data-i18n-aria-label="modal_close"
                    aria-label="Close">×</button>
            </div>
            <div class="dialog-body">
                <p class="dialog-mode-label" id="modal-mode-label"></p>
                <div class="accuracy-display" id="accuracy-percentage"></div>
                <p class="accuracy-label" data-i18n="success_label">success rate</p>
                <div class="dialog-stats">
                    <p><strong data-i18n="correct_answers_label">Correct answers</strong>: <span
                            id="correct-answers"></span></p>
                    <p><strong data-i18n="total_questions_label">Total questions</strong>: <span
                            id="total-questions"></span></p>
                </div>
            </div>
            <div class="dialog-footer">
                <button type="button" class="btn-secondary" data-close-dialog data-i18n="modal_close">Close</button>
                <button type="button" class="btn-primary" id="restart-from-modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                    <span data-i18n="restart">Restart</span>
                </button>
            </div>
        </div>
    </dialog>

    <script src="../assets/js/quiz-config.js"></script>
    <script>
        window.ML_QUIZ_BOOTSTRAP = {
            lang: 'en',
            basePath: '..',
            langSwitchHref: '../',
            quizConfig: window.ML_QUIZ_CONFIG
        };
    </script>
    <script src="../assets/js/translations.js"></script>
    <script src="../assets/js/quiz-app.js"></script>
</body>

</html>
